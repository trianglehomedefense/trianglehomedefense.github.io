/* Triangle Home Defense v2
   Dark NC geology + field inspection direction.
   Static, GitHub Pages-ready. No build step required. */

:root {
  --thd-black: #0b0b0c;
  --thd-graphite-950: #111214;
  --thd-graphite-900: #171819;
  --thd-charcoal-800: #232323;
  --thd-weathered-700: #343230;

  --thd-garnet-950: #2a070d;
  --thd-garnet-900: #3b0d15;
  --thd-garnet-800: #4c121c;
  --thd-garnet-700: #681b29;
  --thd-garnet-oxide: #8d2a34;
  --thd-rust: #9b4638;

  --thd-quartz: #f3ecdf;
  --thd-feldspar: #ded2c0;
  --thd-mica: #b8aa98;
  --thd-paper: #ede5d6;
  --thd-paper-deep: #dbcebb;
  --thd-slate-blue: #56616a;
  --thd-blue-gray: #7c8990;

  --thd-stone-line: rgba(243, 236, 223, 0.17);
  --thd-paper-line: rgba(59, 13, 21, 0.22);
  --thd-shadow-heavy: 0 24px 70px rgba(0, 0, 0, 0.42);
  --thd-shadow-paper: 0 16px 40px rgba(42, 7, 13, 0.11);

  --thd-bg: var(--thd-graphite-950);
  --thd-text-dark: #1d1716;
  --thd-text-light: #f5eee4;
  --thd-text-muted: #c7baab;
  --thd-accent: var(--thd-garnet-700);
  --thd-accent-strong: var(--thd-garnet-oxide);
  --thd-focus: #d7b46a;

  --radius-sm: 5px;
  --radius-md: 12px;
  --radius-lg: 22px;

  --container: 1160px;
  --space-section: clamp(3.5rem, 7vw, 7rem);
  --space-tight: clamp(2rem, 4vw, 3.5rem);
}

* {
  box-sizing: border-box;
}

html {
  background: var(--thd-black);
  color: var(--thd-text-light);
  font-size: 16px;
  scroll-behavior: smooth;
}

body {
  margin: 0;
  color: var(--thd-text-light);
  background:
    radial-gradient(circle at 18% 8%, rgba(104, 27, 41, 0.34), transparent 32rem),
    radial-gradient(circle at 78% 20%, rgba(86, 97, 106, 0.16), transparent 28rem),
    linear-gradient(135deg, #0b0b0c 0%, #151516 42%, #271015 72%, #0e0e0f 100%);
  font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  line-height: 1.55;
  text-rendering: optimizeLegibility;
}

body::before {
  content: "";
  position: fixed;
  inset: 0;
  z-index: -1;
  pointer-events: none;
  opacity: 0.31;
  background-image:
    linear-gradient(115deg, transparent 0 21%, rgba(243, 236, 223, 0.045) 21.4%, transparent 22% 100%),
    linear-gradient(155deg, transparent 0 54%, rgba(141, 42, 52, 0.12) 54.5%, transparent 56% 100%),
    radial-gradient(circle at 33% 30%, rgba(255, 255, 255, 0.055) 0 1px, transparent 2px);
  background-size: 720px 520px, 840px 580px, 44px 44px;
  mix-blend-mode: screen;
}

body::after {
  content: "";
  position: fixed;
  inset: 0;
  z-index: -1;
  pointer-events: none;
  opacity: 0.12;
  background:
    repeating-linear-gradient(8deg, transparent 0 21px, rgba(243, 236, 223, 0.05) 22px, transparent 24px),
    repeating-linear-gradient(118deg, transparent 0 32px, rgba(141, 42, 52, 0.07) 33px, transparent 35px);
}

img,
svg {
  max-width: 100%;
  height: auto;
}

a {
  color: inherit;
}

p {
  margin: 0 0 1rem;
  max-width: 68ch;
}

p:last-child {
  margin-bottom: 0;
}

h1,
h2,
h3,
h4 {
  margin: 0;
  font-family: Georgia, "Times New Roman", serif;
  font-weight: 800;
  letter-spacing: -0.04em;
  text-wrap: balance;
}

h1 {
  max-width: 980px;
  font-size: clamp(3rem, 7.7vw, 6.8rem);
  line-height: 0.88;
}

h2 {
  font-size: clamp(2.1rem, 4vw, 4.25rem);
  line-height: 0.94;
}

h3 {
  font-size: clamp(1.45rem, 2.2vw, 2.15rem);
  line-height: 1.02;
}

ul,
ol {
  margin: 0;
}

.container {
  width: min(100% - 2rem, var(--container));
  margin-inline: auto;
}

.skip-link {
  position: absolute;
  left: 1rem;
  top: 1rem;
  z-index: 1000;
  transform: translateY(-140%);
  padding: 0.7rem 0.9rem;
  background: var(--thd-focus);
  color: var(--thd-black);
  border-radius: var(--radius-sm);
  font-weight: 900;
}

.skip-link:focus {
  transform: translateY(0);
}

.utility-bar {
  background: #070708;
  color: var(--thd-mica);
  border-bottom: 1px solid rgba(243, 236, 223, 0.12);
  font-size: 0.82rem;
  letter-spacing: 0.04em;
}

.utility-bar .container {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 1rem;
  min-height: 34px;
}

.utility-bar a {
  color: var(--thd-quartz);
  text-decoration: none;
  font-weight: 700;
}

.site-header {
  position: sticky;
  top: 0;
  z-index: 100;
  background: rgba(15, 15, 16, 0.94);
  color: var(--thd-text-light);
  border-bottom: 1px solid var(--thd-stone-line);
  backdrop-filter: blur(10px);
}

.site-header .container {
  display: flex;
  align-items: center;
  justify-content: space-between;
  min-height: 74px;
  gap: 1rem;
}

.brand {
  display: inline-flex;
  align-items: center;
  gap: 0.72rem;
  color: var(--thd-text-light);
  text-decoration: none;
  min-width: fit-content;
}

.brand img {
  width: 44px;
  height: 44px;
  object-fit: contain;
}

.brand-title {
  display: block;
  font-family: Georgia, "Times New Roman", serif;
  font-size: clamp(1.05rem, 2vw, 1.28rem);
  font-weight: 800;
  letter-spacing: 0.025em;
  line-height: 1;
}

.brand-tagline {
  display: block;
  margin-top: 0.23rem;
  color: var(--thd-mica);
  font-size: 0.64rem;
  font-weight: 800;
  letter-spacing: 0.18em;
  text-transform: uppercase;
}

.primary-nav {
  display: flex;
  align-items: center;
  gap: clamp(0.7rem, 2vw, 1.25rem);
}

.primary-nav a {
  color: var(--thd-feldspar);
  text-decoration: none;
  font-size: 0.94rem;
  font-weight: 750;
}

.primary-nav a:hover,
.primary-nav a:focus-visible,
.primary-nav a[aria-current="page"] {
  color: var(--thd-quartz);
}

.primary-nav a[aria-current="page"] {
  text-decoration: underline;
  text-decoration-color: var(--thd-garnet-oxide);
  text-underline-offset: 0.35rem;
}

.nav-toggle {
  display: none;
  width: 46px;
  height: 46px;
  border: 1px solid var(--thd-stone-line);
  border-radius: var(--radius-sm);
  background: rgba(243, 236, 223, 0.08);
  color: var(--thd-quartz);
}

.nav-toggle span,
.nav-toggle::before,
.nav-toggle::after {
  content: "";
  display: block;
  width: 21px;
  height: 2px;
  margin: 5px auto;
  background: currentColor;
  border-radius: 999px;
}

.button,
button.button {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  min-height: 46px;
  padding: 0.74rem 1.12rem;
  border: 1px solid rgba(243, 236, 223, 0.28);
  border-radius: var(--radius-sm);
  background: linear-gradient(180deg, var(--thd-garnet-700), var(--thd-garnet-900));
  color: var(--thd-quartz);
  font: inherit;
  font-size: 0.92rem;
  font-weight: 900;
  line-height: 1;
  text-align: center;
  text-decoration: none;
  box-shadow: 0 10px 28px rgba(0, 0, 0, 0.28);
  cursor: pointer;
}

.button:hover,
.button:focus-visible {
  transform: translateY(-1px);
  filter: brightness(1.05);
}

.button.secondary {
  background: rgba(243, 236, 223, 0.09);
  color: var(--thd-quartz);
}

.button.light {
  background: var(--thd-quartz);
  color: var(--thd-garnet-900);
  border-color: rgba(255, 255, 255, 0.45);
}

.button-row {
  display: flex;
  flex-wrap: wrap;
  gap: 0.8rem;
  margin-top: 1.65rem;
}

.hero,
.page-hero {
  position: relative;
  overflow: hidden;
  color: var(--thd-text-light);
  background:
    linear-gradient(90deg, rgba(9, 9, 10, 0.96) 0%, rgba(34, 15, 18, 0.94) 48%, rgba(64, 15, 25, 0.88) 76%, rgba(12, 12, 13, 0.96) 100%),
    radial-gradient(circle at 70% 22%, rgba(141, 42, 52, 0.26), transparent 28rem);
  border-bottom: 1px solid rgba(243, 236, 223, 0.14);
}

.hero::before,
.page-hero::before {
  content: "";
  position: absolute;
  inset: 0;
  pointer-events: none;
  opacity: 0.35;
  background:
    linear-gradient(128deg, transparent 0 36%, rgba(243, 236, 223, 0.07) 36.4%, transparent 37.2% 100%),
    linear-gradient(151deg, transparent 0 55%, rgba(141, 42, 52, 0.22) 55.6%, transparent 58% 100%),
    radial-gradient(circle at 20% 70%, rgba(255, 255, 255, 0.04) 0 1px, transparent 2px);
  background-size: 900px 640px, 760px 540px, 36px 36px;
}

.hero::after,
.page-hero::after {
  content: "";
  position: absolute;
  inset: 0;
  pointer-events: none;
  background:
    linear-gradient(to top, rgba(11, 11, 12, 0.38), transparent 48%),
    repeating-linear-gradient(-9deg, transparent 0 68px, rgba(243, 236, 223, 0.045) 69px, transparent 71px);
}

.hero .container,
.page-hero .container {
  position: relative;
  z-index: 1;
  padding-block: clamp(5.2rem, 10vw, 9rem);
}

.hero--home .container {
  padding-block: clamp(5.8rem, 11vw, 10rem);
}

.hero-copy,
.page-hero p {
  margin-top: 1.25rem;
  color: var(--thd-feldspar);
  font-size: clamp(1.08rem, 2vw, 1.32rem);
}

.local-flag {
  display: inline-flex;
  align-items: center;
  gap: 0.45rem;
  margin-top: 1.9rem;
  color: var(--thd-feldspar);
  font-size: 0.78rem;
  font-weight: 900;
  letter-spacing: 0.1em;
  text-transform: uppercase;
}

.local-flag::before {
  content: "";
  width: 32px;
  height: 1px;
  background: var(--thd-garnet-oxide);
}

.breadcrumbs {
  display: inline-flex;
  margin-bottom: 1.15rem;
  color: var(--thd-mica);
  font-size: 0.82rem;
  font-weight: 800;
}

.breadcrumbs a {
  color: var(--thd-feldspar);
  text-decoration: none;
}

.eyebrow,
.section-label,
.kicker {
  margin-bottom: 0.55rem;
  color: var(--thd-garnet-oxide);
  font-size: 0.74rem;
  font-weight: 950;
  letter-spacing: 0.16em;
  line-height: 1.3;
  text-transform: uppercase;
}

.hero .eyebrow,
.page-hero .eyebrow {
  color: var(--thd-feldspar);
}

.paper-section {
  position: relative;
  color: var(--thd-text-dark);
  background:
    linear-gradient(180deg, rgba(243, 236, 223, 0.97), rgba(222, 210, 192, 0.95)),
    radial-gradient(circle at 10% 20%, rgba(59, 13, 21, 0.08), transparent 22rem);
  border-top: 1px solid rgba(59, 13, 21, 0.16);
  border-bottom: 1px solid rgba(59, 13, 21, 0.16);
}

.paper-section::before {
  content: "";
  position: absolute;
  inset: 0;
  pointer-events: none;
  opacity: 0.22;
  background:
    radial-gradient(circle at 10% 18%, rgba(42, 7, 13, 0.15) 0 1px, transparent 1.5px),
    repeating-linear-gradient(0deg, transparent 0 41px, rgba(59, 13, 21, 0.06) 42px, transparent 43px),
    repeating-linear-gradient(90deg, transparent 0 83px, rgba(59, 13, 21, 0.04) 84px, transparent 85px);
  background-size: 38px 38px, auto, auto;
}

.paper-section > .container,
.section-dark > .container,
.cta-band > .container {
  position: relative;
  z-index: 1;
}

.section-pad {
  padding-block: var(--space-section);
}

.section-pad-tight {
  padding-block: var(--space-tight);
}

.section-dark {
  color: var(--thd-text-light);
  background:
    linear-gradient(135deg, rgba(17, 18, 20, 0.98), rgba(42, 7, 13, 0.82)),
    radial-gradient(circle at 68% 14%, rgba(141, 42, 52, 0.23), transparent 20rem);
  border-block: 1px solid var(--thd-stone-line);
}

.section-dark p {
  color: var(--thd-text-muted);
}

.two-column,
.split {
  display: grid;
  grid-template-columns: minmax(0, 1.1fr) minmax(280px, 0.75fr);
  gap: clamp(2rem, 5vw, 5rem);
  align-items: start;
}

.grid-3 {
  display: grid;
  grid-template-columns: repeat(3, minmax(0, 1fr));
  gap: 1rem;
}

.grid-4 {
  display: grid;
  grid-template-columns: repeat(4, minmax(0, 1fr));
  gap: 1rem;
}

.stack {
  display: grid;
  gap: 1rem;
}

.stack-lg {
  display: grid;
  gap: 1.5rem;
}

.section-head {
  max-width: 850px;
  margin-bottom: clamp(1.8rem, 4vw, 3rem);
}

.section-head p {
  margin-top: 1rem;
  font-size: 1.06rem;
}

.card,
.panel,
.service-card,
.contact-card {
  background: rgba(255, 250, 240, 0.64);
  border: 1px solid var(--thd-paper-line);
  border-radius: var(--radius-md);
  box-shadow: var(--thd-shadow-paper);
}

.card,
.service-card,
.contact-card {
  padding: clamp(1rem, 2.3vw, 1.35rem);
}

.panel {
  padding: clamp(1.35rem, 3vw, 2rem);
}

.card h3,
.service-card h3,
.info-card h3,
.panel h3,
.contact-card h3 {
  color: var(--thd-garnet-900);
}

.card p,
.service-card p,
.panel p,
.contact-card p {
  color: rgba(29, 23, 22, 0.82);
}

.panel ul,
.card ul {
  padding-left: 1.15rem;
}

.panel li,
.card li,
.service-card li {
  margin: 0.55rem 0;
}

.panel li::marker,
.card li::marker,
.service-card li::marker {
  color: var(--thd-garnet-800);
}

.dark-card {
  padding: clamp(1.2rem, 2.8vw, 1.8rem);
  background:
    linear-gradient(180deg, rgba(76, 18, 28, 0.88), rgba(42, 7, 13, 0.93)),
    radial-gradient(circle at 80% 10%, rgba(243, 236, 223, 0.12), transparent 16rem);
  border: 1px solid rgba(243, 236, 223, 0.18);
  border-radius: var(--radius-lg);
  color: var(--thd-text-light);
  box-shadow: var(--thd-shadow-heavy);
}

.dark-card h3,
.dark-card p,
.dark-card li {
  color: inherit;
}

.dark-card p,
.dark-card li {
  color: var(--thd-feldspar);
}

.field-note {
  margin: clamp(1.8rem, 4vw, 3rem) 0;
  padding: clamp(1rem, 2.5vw, 1.4rem) clamp(1.1rem, 2.8vw, 1.6rem);
  color: var(--thd-garnet-900);
  background:
    linear-gradient(180deg, rgba(90, 31, 36, 0.08), rgba(90, 31, 36, 0.04)),
    var(--thd-feldspar);
  border: 1px solid rgba(59, 13, 21, 0.22);
  border-radius: var(--radius-md);
  font-family: Georgia, "Times New Roman", serif;
  font-size: clamp(1.3rem, 2.4vw, 2rem);
  line-height: 1.16;
}

.field-note strong {
  display: inline;
}

.method-list,
.process-list {
  display: grid;
  gap: 0.75rem;
  padding: 0;
  list-style: none;
  counter-reset: method;
}

.method-list li,
.process-list li {
  counter-increment: method;
  display: grid;
  grid-template-columns: 3rem 1fr;
  gap: 1rem;
  align-items: start;
  padding: 1rem;
  background: rgba(255, 250, 240, 0.52);
  border: 1px solid var(--thd-paper-line);
  border-radius: var(--radius-sm);
}

.method-list li::before,
.process-list li::before {
  content: counter(method, decimal-leading-zero);
  display: inline-grid;
  place-items: center;
  width: 2.4rem;
  height: 2.4rem;
  color: var(--thd-quartz);
  background: var(--thd-garnet-800);
  border-radius: 999px;
  font-size: 0.78rem;
  font-weight: 950;
}

.method-list strong,
.process-list strong {
  display: block;
  color: var(--thd-garnet-800);
  font-size: 0.78rem;
  letter-spacing: 0.08em;
  text-transform: uppercase;
}

.scope-note,
.emergency-note {
  padding: 1rem;
  background: rgba(76, 18, 28, 0.08);
  border: 1px solid rgba(76, 18, 28, 0.2);
  border-radius: var(--radius-sm);
  color: rgba(29, 23, 22, 0.84);
}

.scope-note strong,
.emergency-note strong {
  color: var(--thd-garnet-900);
}

.cta-band {
  color: var(--thd-text-light);
  background:
    linear-gradient(90deg, rgba(42, 7, 13, 0.96), rgba(76, 18, 28, 0.94), rgba(17, 18, 20, 0.98)),
    radial-gradient(circle at 76% 30%, rgba(141, 42, 52, 0.22), transparent 24rem);
  border-top: 1px solid rgba(243, 236, 223, 0.16);
  border-bottom: 1px solid rgba(243, 236, 223, 0.12);
}

.cta-band .container {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 2rem;
  padding-block: clamp(3rem, 6vw, 5rem);
}

.cta-band p {
  margin-top: 0.8rem;
  color: var(--thd-feldspar);
}

.contact-grid {
  display: grid;
  grid-template-columns: minmax(0, 0.85fr) minmax(280px, 0.75fr);
  gap: clamp(2rem, 5vw, 5rem);
  align-items: start;
}

.contact-list {
  display: grid;
  gap: 0.75rem;
  margin-top: 1rem;
}

.contact-row {
  display: flex;
  justify-content: space-between;
  gap: 1rem;
  padding: 0.85rem 0;
  border-bottom: 1px solid var(--thd-paper-line);
}

.contact-row span:first-child {
  color: var(--thd-garnet-900);
  font-weight: 900;
}

.contact-row a {
  color: var(--thd-text-dark);
  font-weight: 850;
}

.site-footer {
  color: var(--thd-feldspar);
  background:
    linear-gradient(180deg, #0e0e0f, #0b0b0c),
    radial-gradient(circle at 22% 40%, rgba(104, 27, 41, 0.22), transparent 22rem);
  border-top: 1px solid rgba(243, 236, 223, 0.16);
}

.site-footer .container {
  padding-block: clamp(2.6rem, 5vw, 4.5rem);
}

.footer-grid {
  display: grid;
  grid-template-columns: minmax(260px, 1.1fr) minmax(180px, 0.5fr) minmax(220px, 0.65fr);
  gap: 2rem;
  align-items: start;
}

.footer-brand {
  display: flex;
  align-items: flex-start;
  gap: 0.8rem;
}

.footer-brand img {
  width: 48px;
  height: 48px;
}

.footer-title {
  display: block;
  color: var(--thd-quartz);
  font-family: Georgia, "Times New Roman", serif;
  font-size: 1.24rem;
  font-weight: 800;
  line-height: 1;
}

.footer-small {
  margin-top: 0.4rem;
  color: var(--thd-mica);
  font-size: 0.92rem;
}

.site-footer h3 {
  margin-bottom: 0.7rem;
  color: var(--thd-quartz);
  font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  font-size: 0.78rem;
  letter-spacing: 0.12em;
  text-transform: uppercase;
}

.site-footer ul {
  display: grid;
  gap: 0.35rem;
  padding: 0;
  list-style: none;
}

.site-footer a {
  color: var(--thd-quartz);
  text-decoration: none;
}

.site-footer a:hover,
.site-footer a:focus-visible {
  text-decoration: underline;
}

.legal-line {
  margin-top: 2.2rem;
  padding-top: 1rem;
  border-top: 1px solid rgba(243, 236, 223, 0.12);
  color: var(--thd-mica);
  font-size: 0.78rem;
}

.texture-frame {
  border: 1px solid rgba(243, 236, 223, 0.16);
  border-radius: var(--radius-lg);
  background:
    linear-gradient(135deg, rgba(243, 236, 223, 0.06), rgba(104, 27, 41, 0.12)),
    rgba(11, 11, 12, 0.42);
  box-shadow: var(--thd-shadow-heavy);
}

:focus-visible {
  outline: 3px solid var(--thd-focus);
  outline-offset: 3px;
}

@media (max-width: 960px) {
  .two-column,
  .split,
  .contact-grid,
  .footer-grid {
    grid-template-columns: 1fr;
  }

  .grid-3,
  .grid-4 {
    grid-template-columns: repeat(2, minmax(0, 1fr));
  }

  .cta-band .container {
    display: grid;
  }
}

@media (max-width: 820px) {
  .utility-bar .container {
    display: grid;
    justify-content: start;
    gap: 0.2rem;
    padding-block: 0.45rem;
  }

  .site-header .container {
    min-height: 66px;
  }

  .brand-tagline {
    display: none;
  }

  .nav-toggle {
    display: inline-block;
  }

  .primary-nav {
    position: absolute;
    left: 1rem;
    right: 1rem;
    top: calc(100% + 0.6rem);
    display: grid;
    gap: 0;
    padding: 0.75rem;
    background: rgba(15, 15, 16, 0.98);
    border: 1px solid var(--thd-stone-line);
    border-radius: var(--radius-md);
    box-shadow: var(--thd-shadow-heavy);
    transform: translateY(-0.5rem);
    opacity: 0;
    pointer-events: none;
  }

  .primary-nav a {
    display: block;
    padding: 0.85rem 0.8rem;
    border-radius: var(--radius-sm);
  }

  .primary-nav a:hover,
  .primary-nav a:focus-visible {
    background: rgba(243, 236, 223, 0.08);
  }

  body.nav-open .primary-nav {
    transform: translateY(0);
    opacity: 1;
    pointer-events: auto;
  }
}

@media (max-width: 640px) {
  .container {
    width: min(100% - 1.25rem, var(--container));
  }

  h1 {
    font-size: clamp(2.8rem, 13vw, 4.8rem);
  }

  h2 {
    font-size: clamp(2rem, 9vw, 3.3rem);
  }

  .grid-3,
  .grid-4 {
    grid-template-columns: 1fr;
  }

  .method-list li,
  .process-list li {
    grid-template-columns: 1fr;
  }

  .button-row,
  .button {
    width: 100%;
  }

  .button-row .button {
    justify-content: center;
  }

  .contact-row {
    display: grid;
    gap: 0.2rem;
  }
}

@media (prefers-reduced-motion: reduce) {
  *,
  *::before,
  *::after {
    scroll-behavior: auto !important;
    transition-duration: 0.01ms !important;
    animation-duration: 0.01ms !important;
    animation-iteration-count: 1 !important;
  }
}
